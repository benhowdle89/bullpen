<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" fill="none">
  <!-- Background pill -->
  <rect x="0" y="0" width="700" height="160" rx="16" fill="#1a1a2e"/>

  <!-- Book icon -->
  <g transform="translate(32, 30)">
    <!-- Left page -->
    <path d="M48 8 C48 8, 8 12, 8 20 L8 88 C8 88, 48 84, 48 84 Z" fill="#e94560" opacity="0.9"/>
    <!-- Right page -->
    <path d="M48 8 C48 8, 88 12, 88 20 L88 88 C88 88, 48 84, 48 84 Z" fill="#c81d4e" opacity="0.9"/>
    <!-- Spine highlight -->
    <path d="M48 8 L48 84" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Page lines left -->
    <line x1="20" y1="28" x2="42" y2="25" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="20" y1="40" x2="42" y2="37" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="20" y1="52" x2="42" y2="49" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="20" y1="64" x2="42" y2="61" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <!-- Page lines right -->
    <line x1="54" y1="25" x2="76" y2="28" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="54" y1="37" x2="76" y2="40" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="54" y1="49" x2="76" y2="52" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <!-- 616 -->
    <text x="62" y="73" font-family="Georgia, serif" font-size="7" fill="#1a1a2e" opacity="0.4">616</text>
    <!-- Pen nib -->
    <g transform="translate(60, 10) rotate(25)">
      <path d="M0 0 L4 -6 L8 0 L4 50 Z" fill="#f5c518"/>
      <path d="M0 0 L4 -6 L8 0 Z" fill="#d4a80f"/>
      <line x1="4" y1="0" x2="4" y2="50" stroke="#1a1a2e" stroke-width="0.5" opacity="0.3"/>
    </g>
  </g>

  <!-- BULLPEN text -->
  <text x="148" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#ffffff" letter-spacing="6">BULLPEN</text>

  <!-- Tagline -->
  <text x="152" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#8a8a9a" letter-spacing="2.5">WRITE IN MARKDOWN, PUBLISH EVERYWHERE</text>
</svg>
